openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0
  contact:
    name: ZEGO Support
    email: support@zegocloud.com

servers:
  $ref: '../shared-components.yaml#/servers'

tags:
  - messaging

paths:
  /:
    post:
      tags: [messaging]
      summary: C2cDeliveryReceipt
      description: |
        Use this API to set delivered receipts for one-to-one messages.

        The server can call this API to report the delivery status on behalf of the message receiver. After a successful call, the message sender will receive a delivery receipt push for the corresponding message.
        <Note title="Note">FromUserId is the receiver (operator), and ConvId is the one-to-one chat peer user ID (typically the message sender).</Note>
        <Note title="Note">Rate limit: 20 requests/second.</Note>
      operationId: set-delivery-receipts-for-one-to-one-messages
      parameters:
        - name: Action
          in: query
          description: |
            > API prototype parameter
            >
            > https://zim-api.zego.im/?Action=C2cDeliveryReceipt
          required: true
          schema:
            type: string
            enum: [C2cDeliveryReceipt]
          style: form
          explode: true
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/C2cDeliveryReceiptRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/C2cDeliveryReceiptResponse'

components:
  schemas:
    C2cDeliveryReceiptRequest:
      type: object
      required: [FromUserId,ConvId,ConvMsgSeq]
      properties:
        FromUserId:
          type: string
          description: The operator (message receiver). Must be a registered user.
          example: "receiverUserId"
        ConvId:
          type: string
          description: Conversation ID, i.e., the one-to-one chat peer user ID.
          example: "senderUserId"
        ConvMsgSeq:
          type: array
          items:
            type: number
          description: Message sequence numbers for which delivered receipts need to be set. Up to 10 per request.
          example: [3,4]
    C2cDeliveryReceiptResponse:
      type: object
      properties:
        Code:
          type: number
          description: |
            Return code. (0 indicates success)

            The following only lists return codes related to the API business logic. For the complete list of return codes, please refer to [Global return codes](/zim-server/return-codes).

            <table>
              <thead>
                <tr>
                  <th>Return Code</th>
                  <th>Description</th>
                  <th>Solution</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>660000002</td>
                  <td>Invalid parameter</td>
                  <td>Please check the parameters</td>
                </tr>
                <tr>
                  <td>660300005</td>
                  <td>Rate limit exceeded</td>
                  <td>Please try again later</td>
                </tr>
                <tr>
                  <td>660400102</td>
                  <td>Number of receipt messages exceeds the limit</td>
                  <td>Up to 10 per request, please reduce and retry</td>
                </tr>
                <tr>
                  <td>660400104</td>
                  <td>Failed to set receipts for one-to-one messages</td>
                  <td>Contact technical support</td>
                </tr>
              </tbody>
            </table>
          example: 0
        Message:
          type: string
          description: Return status message.
          example: "success"
        RequestId:
          type: string
          description: Unique request identifier.
          example: "req-123456789"
        DeliveredTime:
          type: number
          description: Server timestamp when the delivered receipt is successfully set for the receiver.
          example: 12345678
